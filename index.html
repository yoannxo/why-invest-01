<!DOCTYPE html>
<!--
====================================================================
  WHY INVEST IN GEN — widget  |  HOW TO UPDATE THIS FILE
====================================================================
  All editable content lives in ONE place: the "DATA" list inside the
  <script> tag lower down (search the file for:  const DATA = ).
  You do NOT need to touch the layout, styles, or JavaScript.

  TO CHANGE TEXT, A STAT, OR AN IMAGE
  -----------------------------------
  Find the tab you want inside DATA. Each tab looks like this:

      {
        id: "cyber-safety",
        label: "Cyber Safety",                 <- name read aloud / tooltip
        icon: "https://.../cyber-safety.svg",  <- the icon image at the top
        image:"https://.../picture.png",       <- the large panel image
        heading:"Best-in-class Cyber Safety",  <- the blue sub-heading
        body:"Our foundation and the trust ...",   <- the paragraph
        stats:[
          {num:">$3.0B", lbl:"CSP revenues"},  <- big number + small label
          ...
        ]
      },

  - Edit only the text BETWEEN the quotation marks "  ".
  - IMAGES + ICONS ARE EMBEDDED: the "icon" and "image" values are long
    "data:..." strings, so the pictures live INSIDE this file (nothing
    else to host). To swap one, replace that whole data: string with
    EITHER a new data: string OR a public https:// image URL. The value
    just has to be something a browser can load as an image.
  - Add a stat by copying a {num:..., lbl:...} line; remove one by
    deleting its line. Add or remove a whole tab the same way.
  - Keep the commas and curly braces exactly as they are.

  TO CHANGE COLORS OR FONTS
  -------------------------
  See the ":root" block at the top of the <style> section. The blue
  sub-heading color is set on ".panel-body h2" (currently #0400f5).

  AFTER EDITING
  -------------
  Save the file and re-upload it to wherever it is hosted. If you still
  see the old version, do a hard refresh (Ctrl/Cmd + Shift + R) or clear
  the host's cache.
====================================================================
-->

<style>
  /* ---------------------------------------------------------------
     THEME TOKENS — change colors/fonts here in one place
  ----------------------------------------------------------------*/
  :root{
    --ink:        #0A1F2E;   /* primary text / headings           */
    --ink-soft:   #44586a;   /* body copy                          */
    --surface:    #ffffff;   /* card / panel background            */
    --mist:       #f3f6f8;   /* page + tab strip background        */
    --line:       #e1e8ed;   /* hairline borders                   */
    --accent:     #15a99a;   /* active tab + stat accent (teal)    */
    --accent-tint:#e6f6f4;   /* active tab fill                    */
    --radius:     16px;
    --maxw:       1080px;
    --col-gap:    64px;      /* space between the image and the copy      */
    --panel-min:  400px;     /* min panel height -> keeps stats aligned    */
    --font-display:'Source Sans Pro','Source Sans 3','Helvetica Neue',Arial,sans-serif;
    --font-body:   'Source Sans Pro','Source Sans 3','Helvetica Neue',Arial,sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--surface);}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px 48px;}

  /* ---------------- Tab strip (icon only) ---------------- */
  .tabs{
    display:flex;flex-wrap:wrap;gap:16px;
    justify-content:space-between;align-items:flex-end;
    margin:24px auto 0;max-width:var(--maxw);
  }
  .tab{
    flex:1 1 150px;                 /* equal share of the row; wraps on small screens */
    display:flex;align-items:flex-end;justify-content:center;
    padding:8px 4px;
    background:none;
    border:none;
    border-bottom:1px solid transparent;
    cursor:pointer;
    transition:border-color .18s ease;
  }
  /* Inactive icons are greyed out; full colour on hover or when selected.
     width:100% makes each icon fill its cell so the five spread across the page. */
  .tab img{
    width:75%;height:auto;display:block;margin:0 auto;
    filter:grayscale(1);
    opacity:.5;
    transition:filter .18s ease, opacity .18s ease;
  }
  .tab:hover img,
  .tab[aria-selected="true"] img{
    filter:none;
    opacity:1;
  }
  .tab[aria-selected="true"]{
    border-bottom-color:#0400f5;
  }
  .tab:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

  /* ---------------- Panel ---------------- */
  .panel{
    display:none;
    margin-top:68px;
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .panel.is-active{
    display:grid;
    grid-template-columns:minmax(300px,440px) 1fr;
    column-gap:var(--col-gap);
    align-items:start;
  }
  @media (prefers-reduced-motion:no-preference){
    .panel.is-active{animation:fade .35s ease both;}
  }
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .panel-media{position:relative;aspect-ratio:1/1;background:var(--mist);}
  /* Image: top-left corner square (90deg), other three rounded */
  .panel-media img{
    width:100%;height:100%;object-fit:cover;display:block;
    border-radius:0 var(--radius) var(--radius) var(--radius);
  }

  /* Copy column: flex so the stats can pin to the bottom and line up
     at the same height on every tab (min height set by --panel-min). */
  .panel-body{
    display:flex;flex-direction:column;
    min-height:var(--panel-min);
    padding:8px 8px 8px 0;
  }
  .panel-body h2{
    font-family:var(--font-display);
    font-size:clamp(22px,2.4vw,30px);
    line-height:1.15;margin:0 0 28px;color:#0400f5;
  }
  .panel-body p{
    font-size:16px;line-height:1.65;color:var(--ink-soft);
    margin:0;max-width:60ch;
  }

  /* margin-top:auto pushes the stats to the bottom; padding-top guarantees
     a minimum gap above them even when the paragraph is long. */
  .stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:24px 22px;margin-top:auto;padding-top:20px;
  }
  .stat{padding-top:0;}
  .stat .num{
    font-family:var(--font-display);
    font-size:clamp(18px,1.9vw,22px);font-weight:700;color:var(--ink);
    line-height:1.15;
  }
  .stat .lbl{font-size:13px;color:var(--ink-soft);margin-top:4px;line-height:1.35;}

  /* ---------------- Responsive ---------------- */
  @media (max-width:760px){
    .panel.is-active{grid-template-columns:1fr;row-gap:28px;}
    .panel-media{aspect-ratio:1/1;}
    .panel-body{min-height:0;padding:0;}
    .stats{grid-template-columns:repeat(2,1fr);padding-top:32px;}
  }
</style>
</head>

/* =====================================================================
   RENDER + INTERACTION  (no libraries, fully self-contained)
   ===================================================================== */
const tablist = document.querySelector(".tabs");
const panelHost = document.getElementById("panels");

DATA.forEach((d, i) => {
  // Tab button
  const tab = document.createElement("button");
  tab.className = "tab";
  tab.setAttribute("role", "tab");
  tab.id = "tab-" + d.id;
  tab.setAttribute("aria-controls", "panel-" + d.id);
  tab.setAttribute("aria-selected", i === 0 ? "true" : "false");
  tab.tabIndex = i === 0 ? 0 : -1;
  tab.setAttribute("aria-label", d.label);
  tab.title = d.label;
  tab.innerHTML = `<img src="${d.icon}" alt="" aria-hidden="true">`;
  tablist.appendChild(tab);

  // Panel
  const panel = document.createElement("section");
  panel.className = "panel" + (i === 0 ? " is-active" : "");
  panel.id = "panel-" + d.id;
  panel.setAttribute("role", "tabpanel");
  panel.setAttribute("aria-labelledby", "tab-" + d.id);
  if (i !== 0) panel.hidden = true;

  const statsHTML = d.stats.map(s =>
    `<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`
  ).join("");

  panel.innerHTML = `
    <div class="panel-media"><img src="${d.image}" alt="${d.heading}"></div>
    <div class="panel-body">
      <h2>${d.heading}</h2>
      <p>${d.body}</p>
      <div class="stats">${statsHTML}</div>
    </div>`;
  panelHost.appendChild(panel);

  tab.addEventListener("click", () => select(i));
});

const tabs = [...tablist.querySelectorAll(".tab")];
const panels = [...panelHost.querySelectorAll(".panel")];

function select(idx){
  tabs.forEach((t, i) => {
    const on = i === idx;
    t.setAttribute("aria-selected", on ? "true" : "false");
    t.tabIndex = on ? 0 : -1;
    panels[i].classList.toggle("is-active", on);
    panels[i].hidden = !on;
  });
  tabs[idx].focus();
  reportHeight();
}

/* Keyboard: arrow keys move between tabs (WAI-ARIA tabs pattern) */
tablist.addEventListener("keydown", (e) => {
  const cur = tabs.findIndex(t => t.getAttribute("aria-selected") === "true");
  let next = null;
  if (e.key === "ArrowRight" || e.key === "ArrowDown") next = (cur + 1) % tabs.length;
  if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   next = (cur - 1 + tabs.length) % tabs.length;
  if (e.key === "Home") next = 0;
  if (e.key === "End")  next = tabs.length - 1;
  if (next !== null){ e.preventDefault(); select(next); }
});

/* =====================================================================
   IFRAME AUTO-HEIGHT — tells the parent page how tall to make the iframe
   so the content is never clipped and there's no empty gap.
   (Parent-side listener snippet is in the chat instructions.)
   ===================================================================== */
function reportHeight(){
  const h = document.documentElement.scrollHeight;
  if (window.parent !== window){
    window.parent.postMessage({ type: "gen-widget-height", height: h }, "*");
  }
}
window.addEventListener("load", reportHeight);
window.addEventListener("resize", reportHeight);
// Re-report once images finish loading (they change the height)
window.addEventListener("load", () => {
  document.querySelectorAll("img").forEach(img => {
    if (!img.complete) img.addEventListener("load", reportHeight);
  });
});
</script>
